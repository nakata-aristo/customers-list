<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニップコーポレーション担当者一覧 | アリストジャパン</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ========== 設定：ここを書き換える ========== */
  /* SUPABASE_URL と SUPABASE_KEY はスクリプト内に記載 */

  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --primary: #1a1a2e;
    --accent: #e05a2b;
    --accent-light: #fff4f0;
    --text: #1a1a2e;
    --text-muted: #9aa0a6;
    --text-sub: #5f6368;
    --border: #e8eaed;
    --hover: #fff8f5;
    --selected: #fff0ea;
    --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ===== ログイン画面 ===== */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--primary);
  }
  .login-card {
    background: white; border-radius: 20px; padding: 48px 40px;
    width: 380px; box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  }
  .login-logo {
    width: 48px; height: 48px; background: var(--accent); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: white; margin-bottom: 24px;
  }
  .login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; letter-spacing: 0.04em; }
  .form-group input {
    width: 100%; padding: 11px 14px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 14px; font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%; padding: 13px; background: var(--accent); color: white;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    font-family: inherit; cursor: pointer; margin-top: 8px;
    transition: opacity 0.15s;
  }
  .btn-login:hover { opacity: 0.9; }
  .login-error { color: #c62828; font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }

  /* ===== メイン画面 ===== */
  #main-screen { display: none; }

  /* ヘッダー */
  .header {
    background: var(--primary); color: white; padding: 0 32px;
    height: 60px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header-logo {
    width: 32px; height: 32px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: white; flex-shrink: 0;
  }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .header-count { font-size: 13px; color: rgba(255,255,255,0.6); }
  .header-count strong { color: var(--accent); font-size: 18px; }
  .header-email { font-size: 11px; color: rgba(255,255,255,0.45); }
  .btn-add-header {
    padding: 6px 14px; background: var(--accent); border: none; border-radius: 8px;
    color: white; font-size: 12px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-add-header:hover { opacity: 0.85; }
  .btn-logout {
    padding: 6px 14px; background: transparent;
    border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
    color: rgba(255,255,255,0.7); font-size: 12px; font-family: inherit; cursor: pointer;
  }

  /* 検索バー */
  .search-bar {
    background: white; padding: 16px 32px; border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 400px; }
  .search-wrap span { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
  .search-wrap input {
    width: 100%; padding: 9px 12px 9px 38px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; background: #f8f9fa;
  }
  .search-wrap input:focus { border-color: var(--accent); background: white; }
  .filter-select {
    padding: 9px 12px; border: 2px solid var(--border); border-radius: 10px;
    font-size: 13px; font-family: inherit; outline: none; background: #f8f9fa;
    color: var(--text); cursor: pointer; min-width: 120px;
  }
  .filter-select:focus { border-color: var(--accent); }
  .btn-toggle {
    padding: 8px 14px; border-radius: 10px; border: 2px solid var(--border);
    background: #f8f9fa; font-size: 12px; font-family: inherit; cursor: pointer;
    color: var(--text-sub); transition: all 0.15s; white-space: nowrap;
  }
  .btn-toggle.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }

  /* テーブル */
  .table-wrap { padding: 20px 32px 80px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); font-size: 13px; }
  thead tr { background: var(--primary); color: white; }
  th {
    padding: 11px 13px; text-align: left; font-weight: 600; font-size: 11px;
    letter-spacing: 0.04em; white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { background: rgba(255,255,255,0.08); }
  th.active { color: #ff8a60; }
  td { padding: 10px 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr { cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: var(--hover); }
  tbody tr.selected { background: var(--selected); }
  tbody tr:last-child td { border-bottom: none; }

  .rank-badge {
    display: inline-block; border-radius: 4px; padding: 2px 7px;
    font-size: 11px; font-weight: 700;
  }
  .handover-badge {
    display: inline-block; background: #e8f5e9; color: #2e7d32;
    border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 700;
  }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

  /* 詳細パネル */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 200;
    align-items: flex-end; justify-content: flex-end; padding: 20px;
  }
  .overlay.show { display: flex; }
  .detail-panel {
    background: white; border-radius: 16px; width: 420px;
    max-height: calc(100vh - 40px); overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .panel-header {
    padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: white;
    border-radius: 16px 16px 0 0; display: flex; align-items: flex-start; gap: 12px;
  }
  .panel-no { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .panel-name { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .panel-badges { margin-top: 7px; display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-close {
    background: #f4f5f7; border: none; border-radius: 50%;
    width: 30px; height: 30px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; color: var(--text-sub);
    flex-shrink: 0; margin-left: auto;
  }
  .panel-body { padding: 16px 20px 20px; }
  .panel-section { margin-bottom: 16px; }
  .panel-section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;
  }
  .panel-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .panel-label { font-size: 12px; color: var(--text-muted); min-width: 90px; flex-shrink: 0; padding-top: 1px; }
  .panel-value { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.4; }
  .panel-value a { color: var(--accent); text-decoration: none; }
  .panel-value.highlight { color: var(--accent); font-weight: 700; }
  .panel-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .btn-edit {
    flex: 1; padding: 10px; background: var(--primary); color: white;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-edit:hover { opacity: 0.85; }
  .btn-delete {
    padding: 10px 16px; background: white; color: #c62828;
    border: 1px solid #f5c6c6; border-radius: 8px; font-size: 13px;
    font-family: inherit; cursor: pointer; transition: all 0.15s;
  }
  .btn-delete:hover { background: #fdf2f2; }

  /* モーダル（追加・編集） */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 300;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white; border-radius: 16px; width: 560px;
    max-height: calc(100vh - 40px); overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    animation: slideIn 0.2s ease;
  }
  .modal-header {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: white; border-radius: 16px 16px 0 0;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-body { padding: 20px 24px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-grid .full { grid-column: 1 / -1; }
  .field-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; letter-spacing: 0.04em; }
  .field-group input, .field-group select {
    width: 100%; padding: 9px 12px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 13px; font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  .field-group input:focus, .field-group select:focus { border-color: var(--accent); }
  .modal-footer {
    padding: 16px 24px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
    position: sticky; bottom: 0; background: white; border-radius: 0 0 16px 16px;
  }
  .btn-cancel {
    padding: 10px 20px; background: white; border: 2px solid var(--border);
    border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer;
  }
  .btn-save {
    padding: 10px 24px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.9; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

  /* トースト */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--primary); color: white; padding: 12px 24px;
    border-radius: 10px; font-size: 14px; font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 500;
    transition: transform 0.3s ease; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #c62828; }

  /* ローディング */
  .loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }

  mark { background: #ffe082; border-radius: 2px; padding: 0 1px; }
</style>
</head>

<script>
// ============================================================
// ★★★ここを書き換える★★★
const SUPABASE_URL = 'https://uirctesyaocxublggttj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpcmN0ZXN5YW9jeHVibGdndHRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjUxMTcsImV4cCI6MjA5Mjk0MTExN30.0SZrT89I8eXKvf2WiTlMd5T7t59K-fm73D3CE1AXClQ';
// ============================================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let allCustomers = [];
let filteredCustomers = [];
let selectedCustomer = null;
let editingId = null;
let sortKey = 'no';
let sortDir = 'asc';
let onlyHandover = false;

// ===== ユーティリティ =====
function fmt(val) {
  if (!val || val === '0' || val === 0) return '—';
  return '¥' + Number(val).toLocaleString('ja-JP');
}
function hl(text, q) {
  if (!q || !text) return text || '';
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return text;
  return text.slice(0,i) + '<mark>' + text.slice(i, i+q.length) + '</mark>' + text.slice(i+q.length);
}
function rankStyle(r) {
  const map = { A:'background:#fff3e0;color:#e65100', B:'background:#e8eaf6;color:#283593', C:'background:#f3e5f5;color:#6a1b9a', D:'background:#fafafa;color:#757575;border:1px solid #e0e0e0', E:'background:#f0f0f0;color:#555', F:'background:#fce4ec;color:#880e4f' };
  return map[r] || 'background:#f0f0f0;color:#333';
}
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function today() {
  return new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });
}

// ===== 認証 =====
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('btn-login').addEventListener('click', doLogin);

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  document.getElementById('btn-login').textContent = '...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  document.getElementById('btn-login').textContent = 'ログイン';
  if (error) { errEl.textContent = 'メールアドレスまたはパスワードが正しくありません'; return; }
  showMain(data.user.email);
}

document.getElementById('btn-logout').addEventListener('click', async () => {
  await sb.auth.signOut();
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
});

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showMain(session.user.email);
}

function showMain(email) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('header-email').textContent = email;
  document.getElementById('header-date').textContent = today() + '時点';
  loadCustomers();
}

// ===== データ取得 =====
async function loadCustomers() {
const { data: { session } } = await sb.auth.getSession();
console.log('session:', session);
if (!session) { showToast('セッション切れ。再ログインしてください', true); return; }
  const { data, error } = await sb.from('customers').select('*').order('no', { ascending: true });
  if (error) { showToast('データ取得エラー', true); return; }
  allCustomers = data;
  buildFilters();
  applyFilters();
}

function buildFilters() {
  const prefs = [...new Set(allCustomers.map(c=>c.pref).filter(Boolean))].sort();
  const aristos = [...new Set(allCustomers.map(c=>c.aristoContact || c.aristo_contact).filter(Boolean))].sort();
  const ranks = [...new Set(allCustomers.map(c=>c.rank).filter(Boolean))].sort();

  const fp = document.getElementById('filter-pref');
  fp.innerHTML = '<option value="">都道府県：すべて</option>' + prefs.map(p=>`<option value="${p}">${p}</option>`).join('');
  const fa = document.getElementById('filter-aristo');
  fa.innerHTML = '<option value="">アリスト担当：すべて</option>' + aristos.map(a=>`<option value="${a}">${a}</option>`).join('');
  const fr = document.getElementById('filter-rank');
  fr.innerHTML = '<option value="">ランク：すべて</option>' + ranks.map(r=>`<option value="${r}">${r}ランク</option>`).join('');
}

function getField(c, ...keys) {
  for(const k of keys) if(c[k] !== undefined && c[k] !== null) return c[k];
  return '';
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const pref = document.getElementById('filter-pref').value;
  const aristo = document.getElementById('filter-aristo').value;
  const rank = document.getElementById('filter-rank').value;

  filteredCustomers = allCustomers.filter(c => {
    const ac = getField(c,'aristoContact','aristo_contact');
    const cn = getField(c,'contactName','contact_name');
    if (q && !['name','pref','address','phone','mobile','email'].concat(['contactName','contact_name','aristoContact','aristo_contact']).some(k => (c[k]||'').toLowerCase().includes(q))) {
      const searchStr = [c.name, c.pref, c.address, c.phone, c.mobile, c.email, cn, ac].join(' ').toLowerCase();
      if (!searchStr.includes(q)) return false;
    }
    if (pref && c.pref !== pref) return false;
    if (aristo && ac !== aristo) return false;
    if (rank && c.rank !== rank) return false;
    if (onlyHandover && c.handover !== '✓') return false;
    return true;
  });

  // ソート
  filteredCustomers.sort((a, b) => {
    let av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
    if (sortKey === 'no' || sortKey === 'sales2023' || sortKey === 'sales2024') {
      av = Number(av) || 0; bv = Number(bv) || 0;
    }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  document.getElementById('count-filtered').textContent = filteredCustomers.length;
  document.getElementById('count-total').textContent = allCustomers.length;
  renderTable();
}

// ===== テーブル描画 =====
function renderTable() {
  const q = document.getElementById('search-input').value;
  const container = document.getElementById('table-container');
  if (filteredCustomers.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🔎</div><div>「${q}」に一致する顧客は見つかりませんでした</div></div>`;
    return;
  }
  const cols = [
    { key:'no', label:'No.', w:'48px' },
    { key:'pref', label:'都道府県' },
    { key:'name', label:'取引先名' },
    { key:'handover', label:'引渡' },
    { key:'rank', label:'ランク' },
    { key:'contact_name', label:'取引先担当者' },
    { key:'aristo_contact', label:'アリスト担当' },
    { key:'phone', label:'電話' },
    { key:'tradeable', label:'取引状況' },
    { key:'address', label:'住所' },
  ];

  let html = `<table><thead><tr>`;
  cols.forEach(col => {
    const active = sortKey === col.key || (col.key === 'contactName' && sortKey === 'contact_name') || (col.key === 'aristoContact' && sortKey === 'aristo_contact');
    const arrow = active ? (sortDir === 'asc' ? ' ↑' : ' ↓') : ' ↕';
    html += `<th class="${active?'active':''}" style="${col.w?'width:'+col.w:''}" data-key="${col.key}">${col.label}<span style="font-size:10px;opacity:0.7">${arrow}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  filteredCustomers.forEach(c => {
    const ac = c.aristo_contact || '';
    const cn = c.contact_name || '';
    const sel = selectedCustomer && selectedCustomer.id === c.id ? ' selected' : '';

    html += `<tr class="${sel}" data-id="${c.id}">
      <td style="color:var(--text-muted);font-size:12px">${c.no||''}</td>
      <td style="white-space:nowrap;font-size:12px;color:var(--text-sub)">${hl(c.pref||'', q)}</td>
      <td style="font-weight:600;min-width:180px;max-width:240px">${hl(c.name||'', q)}</td>
      <td>${c.handover==='✓'?'<span class="handover-badge">✓</span>':''}</td>
      <td>${c.rank?`<span class="rank-badge" style="${rankStyle(c.rank)}">${c.rank}ランク</span>`:''}</td>
      <td style="min-width:90px;white-space:nowrap;font-weight:600">${hl(cn, q)||'—'}</td>
      <td style="min-width:90px;white-space:nowrap;color:var(--text-sub)">${hl(ac, q)||'—'}</td>
      <td style="min-width:130px;white-space:nowrap">${c.phone?`<a href="tel:${c.phone}" style="color:var(--accent);text-decoration:none" onclick="event.stopPropagation()">${c.phone}</a>`:'—'}</td>
      <td style="font-size:12px;color:var(--text-sub);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.tradeable||'—'}</td>
      <td style="color:var(--text-sub);font-size:12px;max-width:280px;line-height:1.4">${c.address||''}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  container.innerHTML = html;

  // ソートクリック
  container.querySelectorAll('th[data-key]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.key;
      if (sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = k; sortDir = 'asc'; }
      applyFilters();
    });
  });

  // 行クリック
  container.querySelectorAll('tbody tr').forEach(tr => {
    tr.addEventListener('click', () => {
      const c = allCustomers.find(x => x.id == tr.dataset.id);
      if (c) openDetail(c);
    });
  });
}

// ===== 詳細パネル =====
function openDetail(c) {
  selectedCustomer = c;
  // 選択行のハイライトだけ更新
  document.querySelectorAll('tbody tr').forEach(tr => {
    tr.classList.toggle('selected', tr.dataset.id == c.id);
  });
  const ac = getField(c,'aristoContact','aristo_contact');
  const cn = getField(c,'contactName','contact_name');
  const no = getField(c,'nipContact','nip_contact');
  const nof = getField(c,'nipOffice','nip_office');
  const na = getField(c,'nipArea','nip_area');
  const td = getField(c,'tradeable');

  document.getElementById('panel-no').textContent = `No. ${c.no}`;
  document.getElementById('panel-name').textContent = c.name;
  document.getElementById('panel-badges').innerHTML =
    (c.handover==='✓'?'<span class="handover-badge">引渡し顧客</span>':'')+
    (c.rank?`<span class="rank-badge" style="${rankStyle(c.rank)}">${c.rank}ランク</span>`:'');

  let body = '';
  const row = (label, val, href='', highlight=false) => {
    if (!val) return '';
    const v = href ? `<a href="${href}">${val}</a>` : val;
    return `<div class="panel-row"><div class="panel-label">${label}</div><div class="panel-value${highlight?' highlight':''}">${v}</div></div>`;
  };

  body += `<div class="panel-section"><div class="panel-section-title">担当者</div>
    ${row('取引先担当者', cn, '', true)}
    ${row('アリスト担当', ac)}
    ${row('NIPエリア', na)}
    ${row('NIP営業所', nof)}
    ${row('NIP担当者', no)}
  </div>`;

  body += `<div class="panel-section"><div class="panel-section-title">連絡先</div>
    ${row('電話', c.phone, `tel:${c.phone}`)}
    ${row('携帯', c.mobile, `tel:${c.mobile}`)}
    ${row('FAX', c.fax)}
    ${row('メール', c.email, `mailto:${c.email}`)}
    ${row('住所', c.address)}
  </div>`;

  body += `<div class="panel-section"><div class="panel-section-title">取引条件</div>
    ${row('締め日', c.closing)}
    ${row('回収条件', c.collection)}
    ${row('取引状況', td)}
  </div>`;

  body += `<div class="panel-actions">
    <button class="btn-edit" onclick="openEdit()">編集</button>
    <button class="btn-delete" onclick="deleteCustomer()">削除</button>
  </div>`;

  document.getElementById('panel-body').innerHTML = body;
  document.getElementById('detail-overlay').classList.add('show');
}

document.getElementById('detail-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
});
document.getElementById('btn-panel-close').addEventListener('click', closeDetail);
function closeDetail() {
  selectedCustomer = null;
  document.getElementById('detail-overlay').classList.remove('show');
  document.querySelectorAll('tbody tr').forEach(tr => tr.classList.remove('selected'));
}

// ===== 追加・編集モーダル =====
document.getElementById('btn-add-open').addEventListener('click', () => openModal(null));
document.getElementById('btn-modal-close').addEventListener('click', closeModal);
document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===document.getElementById('modal-overlay')) closeModal(); });

function openModal(c) {
  editingId = c ? c.id : null;
  document.getElementById('modal-title').textContent = c ? '顧客情報を編集' : '新規顧客追加';
  const fieldMap = {
    'name': 'name', 'pref': 'pref', 'rank': 'rank',
    'contactName': 'contact_name', 'aristoContact': 'aristo_contact',
    'phone': 'phone', 'mobile': 'mobile', 'fax': 'fax',
    'email': 'email', 'address': 'address',
    'closing': 'closing', 'collection': 'collection',
    'nip_area': 'nip_area', 'nip_office': 'nip_office',
    'nip_contact': 'nip_contact', 'tradeable': 'tradeable',
    'handover': 'handover',
  };
  Object.entries(fieldMap).forEach(([inputId, dataKey]) => {
    const el = document.getElementById('f-'+inputId);
    if (!el) return;
    el.value = c ? (c[dataKey] || '') : '';
  });
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  editingId = null;
}

function openEdit() {
  if (!selectedCustomer) return;
  closeDetail();
  openModal(selectedCustomer);
}

document.getElementById('btn-modal-save').addEventListener('click', async () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('取引先名は必須です', true); return; }

  const btn = document.getElementById('btn-modal-save');
  btn.disabled = true; btn.textContent = '保存中...';

  const payload = {
    name,
    pref: document.getElementById('f-pref').value.trim(),
    rank: document.getElementById('f-rank').value,
    contact_name: document.getElementById('f-contactName').value.trim(),
    aristo_contact: document.getElementById('f-aristoContact').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    mobile: document.getElementById('f-mobile').value.trim(),
    fax: document.getElementById('f-fax').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    address: document.getElementById('f-address').value.trim(),
    closing: document.getElementById('f-closing').value.trim(),
    collection: document.getElementById('f-collection').value.trim(),
    nip_area: document.getElementById('f-nip_area').value.trim(),
    nip_office: document.getElementById('f-nip_office').value.trim(),
    nip_contact: document.getElementById('f-nip_contact').value.trim(),
    tradeable: document.getElementById('f-tradeable').value.trim(),
    handover: document.getElementById('f-handover').value,
  };

  let error;
  if (editingId) {
    ({ error } = await sb.from('customers').update(payload).eq('id', editingId));
  } else {
    const maxNo = allCustomers.length > 0 ? Math.max(...allCustomers.map(c=>Number(c.no)||0)) : 0;
    payload.no = String(maxNo + 1);
    ({ error } = await sb.from('customers').insert([payload]));
  }

  btn.disabled = false; btn.textContent = '保存';
  if (error) { showToast('保存エラー：' + error.message, true); return; }
  showToast(editingId ? '更新しました' : '追加しました');
  closeModal();
  await loadCustomers();
});

// ===== 削除 =====
async function deleteCustomer() {
  if (!selectedCustomer) return;
  if (!confirm(`「${selectedCustomer.name}」を削除しますか？\nこの操作は元に戻せません。`)) return;
  const { error } = await sb.from('customers').delete().eq('id', selectedCustomer.id);
  if (error) { showToast('削除エラー', true); return; }
  showToast('削除しました');
  closeDetail();
  await loadCustomers();
}

// ===== フィルター・検索イベント =====
document.getElementById('search-input').addEventListener('input', applyFilters);
document.getElementById('filter-pref').addEventListener('change', applyFilters);
document.getElementById('filter-aristo').addEventListener('change', applyFilters);
document.getElementById('filter-rank').addEventListener('change', applyFilters);
document.getElementById('btn-handover').addEventListener('click', () => {
  onlyHandover = !onlyHandover;
  document.getElementById('btn-handover').classList.toggle('active', onlyHandover);
  applyFilters();
});

// ===== 起動 =====
checkSession();
</script>
</body>
</html>
